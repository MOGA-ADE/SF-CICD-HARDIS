##############################################################################
# check-deploy.yml
# Triggered on every Pull Request targeting PreProd or main.
# Runs a check-only (validate) deployment so the PR cannot be merged
# until the metadata compiles and tests pass.
##############################################################################

name: "🔍 Check Deploy (PR Validation)"

on:
  pull_request:
    branches:
      - main
      - PreProd
    types: [opened, synchronize, reopened, ready_for_review]

# Cancel in-progress runs for the same PR to save runner minutes
concurrency:
  group: check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-deploy:
    name: "Validate → ${{ github.base_ref }}"
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false

    steps:
      # ─────────────────────────────────────────────────────────────────────────
      # 1. Checkout — full history required for delta calculation
      # ─────────────────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ─────────────────────────────────────────────────────────────────────────
      # 2. Setup Node.js
      # ─────────────────────────────────────────────────────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      # ─────────────────────────────────────────────────────────────────────────
      # 3. Install Salesforce CLI + sfdx-hardis
      # ─────────────────────────────────────────────────────────────────────────
      - name: Install Salesforce CLI + sfdx-hardis
        run: |
          npm install -g @salesforce/cli sfdx-hardis
          sf version
          echo "sfdx-hardis version: $(sfdx hardis:version 2>/dev/null || npx sfdx-hardis --version 2>/dev/null || echo 'unknown')"

      # ─────────────────────────────────────────────────────────────────────────
      # 4. Authenticate to the TARGET sandbox using JWT (Connected App)
      # ─────────────────────────────────────────────────────────────────────────
      - name: Authenticate to target org (${{ github.base_ref }})
        env:
          SFDX_CLIENT_ID:    ${{ secrets[format('SFDX_CLIENT_ID_{0}', github.base_ref)] }}
          SFDX_CLIENT_KEY:   ${{ secrets[format('SFDX_CLIENT_KEY_{0}', github.base_ref)] }}
          SFDX_INSTANCE_URL: ${{ secrets[format('SFDX_INSTANCE_URL_{0}', github.base_ref)] }}
        run: |
          echo "$SFDX_CLIENT_KEY" | base64 --decode > server.key
          sf org login jwt \
            --client-id     "$SFDX_CLIENT_ID" \
            --jwt-key-file  server.key \
            --instance-url  "$SFDX_INSTANCE_URL" \
            --alias         target-org \
            --set-default
          rm -f server.key

      # ─────────────────────────────────────────────────────────────────────────
      # 5. Check-only deploy (validate)
      #    For PR events:
      #      github.head_ref = the source branch (e.g. dev_Jerome)
      #      github.base_ref = the target branch (e.g. PreProd)
      # ─────────────────────────────────────────────────────────────────────────
      - name: Run check-only deploy
        env:
          GITHUB_TOKEN: ${{ secrets.PAT || secrets.GITHUB_TOKEN }}
          # For PR validation events, base_ref is the TARGET branch being deployed to
          CI_COMMIT_REF_NAME: ${{ github.base_ref }}
          CI_COMMIT_SHA: ${{ github.sha }}
          # Explicitly pass source branch so delta detection is reliable
          FORCE_SOURCE_BRANCH: ${{ github.head_ref }}
          SFDX_DISABLE_FLOW_DIFF: "true"
        run: |
          echo "📌 Target branch (base):  $CI_COMMIT_REF_NAME"
          echo "📌 Source branch (head):  $FORCE_SOURCE_BRANCH"
          sfdx hardis:project:deploy:sources:dx \
            --check \
            --target-org target-org \
            --debug

      # ─────────────────────────────────────────────────────────────────────────
      # 6. Upload test results
      # ─────────────────────────────────────────────────────────────────────────
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: check-results-${{ github.event.pull_request.number }}-${{ github.run_id }}
          path: |
            **/*.xml
            .sfdx/tools/testresults/
            hardis-report/
          retention-days: 14
