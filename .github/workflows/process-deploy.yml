---
# Manual updates in in job step "Login & Process Deployment" below:
# - variables for additional branches: add SFDX_CLIENT_ID / KEY variables
# - To use slack notifications, you can also define SLACK_TOKEN and SLACK_CHANNEL_ID
#   - For branch scoped messages, add SLACK_CHANNEL_ID_ + branch name (ex: SLACK_CHANNEL_ID_INTEGRATION, SLACK_CHANNEL_ID_UAT)
on:
  push:
    # Add your major branches names here
    branches:
      - main
      - PreProd

name: Process Deployment (sfdx-hardis)
permissions: read-all
concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

jobs:
  process_deployment:
    name: Process Deployment to Major Org
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: write
      issues: write
    steps:
      # Git Checkout
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          persist-credentials: true
          token: ${{ secrets.PAT || secrets.GITHUB_TOKEN }}
          fetch-depth: 0
      # Setup node
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
      # SFDX & plugins
      - name: Install SFDX and plugins
        run: |
          npm install @salesforce/cli --global
          sf plugins install @salesforce/plugin-packaging
          echo 'y' | sf plugins install sfdx-hardis
          # echo 'y' | sf plugins install sfdmu # Disabled while it does not play well with @salesforce/cli
          echo 'y' | sf plugins install sfdx-git-delta
            sf version --verbose --json
      # Set env branch variable (github.ref_name seems to not work)
      - name: Set env.BRANCH
        run: |
          echo "BRANCH=$(echo "$GITHUB_REF" | cut -d'/' -f 3)" >> "$GITHUB_ENV"
          echo "CI_COMMIT_BEFORE_SHA=${{ github.event.before }}" >> "$GITHUB_ENV"

      # Get the source branch of the merged PR
      - name: Get merged PR source branch
        run: |
          SOURCE=$(curl -s \
            -H "Authorization: Bearer ${{ secrets.PAT || secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
            | python3 -c "
              import sys, json
              try:
                  prs = json.load(sys.stdin)
                  print(prs[0]['head']['ref'] if prs else '')
              except:
                  print('')
              " 2>/dev/null || echo "")
          echo "Source branch detected: $SOURCE"
          echo "SOURCE_BRANCH=$SOURCE" >> "$GITHUB_ENV"
      # Login & check deploy with test classes & code coverage
      - name: Login & Process Deployment
        env:
          SFDX_CLIENT_ID_PREPROD: ${{ secrets.SFDX_CLIENT_ID_PREPROD}}
          SFDX_CLIENT_KEY_PREPROD: ${{ secrets.SFDX_CLIENT_KEY_PREPROD}}
          SFDX_CLIENT_ID_MAIN: ${{ secrets.SFDX_CLIENT_ID_MAIN}}
          SFDX_CLIENT_KEY_MAIN: ${{ secrets.SFDX_CLIENT_KEY_MAIN}}
          SFDX_AUTH_URL_TECHNICAL_ORG: ${{ secrets.SFDX_AUTH_URL_TECHNICAL_ORG }}
          SFDX_DEPLOY_WAIT_MINUTES: ${{ vars.SFDX_DEPLOY_WAIT_MINUTES || '120' }}
          SFDX_TEST_WAIT_MINUTES: ${{ vars.SFDX_TEST_WAIT_MINUTES || '120' }}
          CI_COMMIT_REF_NAME: ${{ env.BRANCH }} # Defines the target branch of the PR
          ORG_ALIAS: ${{ env.BRANCH }} # Defines the target branch of the PR
          CONFIG_BRANCH: ${{ env.BRANCH }} # Defines the target branch of the PR
          CI_COMMIT_BEFORE_SHA: ${{ env.CI_COMMIT_BEFORE_SHA }}
          CI_MERGE_REQUEST_SOURCE_BRANCH_NAME: ${{ env.SOURCE_BRANCH }}
          GITHUB_TOKEN: ${{ secrets.PAT || secrets.GITHUB_TOKEN }}
          SLACK_TOKEN: ${{ secrets.SLACK_TOKEN }}
          SLACK_CHANNEL_ID: ${{ secrets.SLACK_CHANNEL_ID }}
          NOTIF_EMAIL_ADDRESS: ${{ secrets.NOTIF_EMAIL_ADDRESS }}
          JIRA_HOST: ${{ secrets.JIRA_HOST }}
          JIRA_EMAIL: ${{ secrets.JIRA_EMAIL }}
          JIRA_TOKEN: ${{ secrets.JIRA_TOKEN }}
          JIRA_PAT: ${{ secrets.JIRA_HOST }}
          FORCE_COLOR: "1"
        run: |
          echo "Process SFDX deployment using Hardis against \"$CONFIG_BRANCH\""
          sf hardis:auth:login

          # Calculate delta directly from git SHAs — no PR detection needed
          FROM_SHA="${CI_COMMIT_BEFORE_SHA}"
          TO_SHA=$(git rev-parse HEAD)
          echo "📦 Delta: $FROM_SHA → $TO_SHA"

          mkdir -p delta
          sf sgd:source:delta \
            --from "$FROM_SHA" \
            --to "$TO_SHA" \
            --output-dir ./delta \
            --generate-delta \
            --repo-dir . || echo "⚠️ sgd completed with warnings"

          echo "📋 Package to deploy:"
          cat ./delta/package/package.xml 2>/dev/null || echo "No changes found"

          if grep -q "<types>" ./delta/package/package.xml 2>/dev/null; then
            sf project deploy start \
              --manifest ./delta/package/package.xml \
              --target-org "$ORG_ALIAS" \
              --test-level RunLocalTests \
              --wait 120
          else
            echo "✅ No changes to deploy"
          fi
