<template>
    <lightning-card >
        <template if:true={searchFound}>
            <div class="slds-grid slds-gutters slds-wrap slds-grid_align-end slds-p-around_medium">
                <div class="slds-col slds-size_1-of-1 slds-m-bottom_x-small" draggable="true" ondragover={handleDragOver} ondrop={handleDrop}>
                    <div id="holderCOPRO" class="slds-var-m-top_medium slds-align_absolute-center drop slds-box slds-theme_default">
                        <strong>Glisser/Déposer votre fichier de facturation</strong>
                    </div>
                </div>
            </div>
        </template>
        <div slot="footer">
            <lightning-button class="slds-m-right_small" variant="brand" label="Lancer la vérification" title="Lancer la vérification" disabled={checkDisabled} onclick={checkAppelFacturationFile}></lightning-button>
            <lightning-button class="slds-m-left_small" variant="neutral" label="Lancer une nouvelle recherche" title="Lancer une nouvelle recherche" onclick={returnFirstCard}></lightning-button>
        </div>
    </lightning-card>
</template>
