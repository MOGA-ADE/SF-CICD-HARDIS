<template>
	<lightning-card title="Importer les points d'énergie des copropriétés" icon-name="standard:account">
		<lightning-spinner if:true={showSpinner}></lightning-spinner>
		<div class="slds-p-around_medium">
			<div class="slds-grid slds-gutters slds-wrap slds-grid_align-end">
				<div class="slds-col slds-size_1-of-2 slds-m-bottom_x-small" draggable="true" ondragover={handleDragOver}
					ondrop={handleDrop}>
					<div id="holderElecCopro" class="slds-var-m-top_medium slds-align_absolute-center drop">
						Glisser/Déposer votre fichier de ELEC
					</div>
				</div>
                <div class="slds-col slds-size_1-of-2 slds-m-bottom_x-small" draggable="true" ondragover={handleDragOver}
					ondrop={handleDrop}>
					<div id="holderGazCopro" class="slds-var-m-top_medium slds-align_absolute-center drop">
						Glisser/Déposer votre fichier de GAZ
					</div>
				</div>
			</div>
		</div>
	</lightning-card>
	 <lightning-card variant="narrow" >
        <h1 slot="title">Mettre à jour tous les points d'énergie</h1>
        <lightning-spinner lwc:if={showSpinner}></lightning-spinner>
        <lightning-button label="Télécharger les points d'énergie" slot="actions" onclick={getAllPdes}></lightning-button>
        <div class="slds-p-around_medium">
            <template if:true={isShowDrag}>
                <div class="slds-grid slds-gutters slds-wrap">
                    <div id="updatePDE" class="slds-col slds-var-m-top_medium slds-align_absolute-center drop" style=" height:100px;margin-left:11px;" draggable="true" ondragover={handleDragOver} ondrop={handleDropUpdate}>      
                        Glisser/Déposer votre fichier de mise à jour
                    </div>
                </div>
            </template>
        </div>
    </lightning-card>
</template>
