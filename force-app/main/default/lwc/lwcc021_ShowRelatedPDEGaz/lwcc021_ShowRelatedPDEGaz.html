<!-- sldsValidatorIgnore -->
<template>
    <article class="slds-card">
      <div class="slds-card__header slds-grid">
        <header class="slds-media slds-media_center slds-has-flexi-truncate">
          <div class="slds-media__figure">
          </div>
          <div class="slds-media__body">
            <h2 class="slds-card__header-title">
              <a href={viewAllURL} class="slds-card__header-link slds-truncate" title="PDE Gaz ({relatedPDEsize})">
                <span>Points d'énergie 🔥({numberOfelement})</span>
              </a>
            </h2>
          </div>
          <div class="slds-no-flex">
            <button class="slds-button slds-button_neutral" onclick={downloadCSVGaz}>Télécharger template CSV Gaz</button>
          </div>
        </header>
      </div>
      <div class="slds-card__body">
        <lightning-datatable
          key-field="id"
          data={relatedPDE}
          show-row-number-column
          row-number-offset={rowOffset}
          hide-checkbox-column
          columns={columns}>
        </lightning-datatable>
      </div>
      <footer class="slds-card__footer">
        <a if:true={showViewAll} class="slds-card__footer-action" style="text-align: center;" href={viewAllURL}>Voir tout
          <span class="slds-assistive-text">PDE</span>
        </a>
      </footer>
    </article>
  </template>
